<style>
  .item { margin: 6px 0; font-size: 14px; }
  .item.done { color: #8b949e; text-decoration: line-through; }
  .check { font-family: monospace; margin-right: 8px; }
  hr { border: none; border-top: 1px solid #30363d; margin: 16px 0; }
</style>

<h2>Checklist</h2>

<div class="item"><span class="check">[x]</span> First completed item</div>
<div class="item"><span class="check">[ ]</span> Pending item</div>
<div class="item"><span class="check">[ ]</span> Another pending item</div>

<hr>

<h3>Later</h3>
<div class="item"><span class="check">[ ]</span> Future task</div>
